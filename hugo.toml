baseURL = "https://falicitas.github.io/"
locale = "zh-CN"
title = "Kinesis' blogs"
theme = "PaperMod"
hasCJKLanguage = true

[pagination]
  pagerSize = 10

[outputFormats.RSS]
  mediatype = "application/rss+xml"
  baseName  = "atom"

[params]
  ShowReadingTime = true
  defaultTheme = "auto"
  comments = true
  [params.homeInfoParams]
    Title = "Kinesis"
    Content = "个人博客"
  [params.giscus]
    repo = "Falicitas/Falicitas.github.io"
    repoId = "MDEwOlJlcG9zaXRvcnkzNDU3MDE5NzY="
    category = "Announcements"
    categoryId = "DIC_kwDOFJr-WM4C_K4t"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "zh-CN"

[[menu.main]]
  name = "Posts"
  url  = "/posts/"
  weight = 1
[[menu.main]]
  name = "Tags"
  url  = "/tags/"
  weight = 2
[[menu.main]]
  name = "RSS"
  url  = "/atom.xml"
  weight = 3
